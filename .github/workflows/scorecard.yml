# OpenSSF Scorecard — automated supply-chain security audit.
#
# Runs weekly + on push to main. Publishes results to the OpenSSF Scorecard
# API so they're visible at:
#   https://api.securityscorecards.dev/projects/github.com/ar-agents/ar-agents
#
# Also uploads SARIF to GitHub Code Scanning so issues surface in the
# Security tab of the repo. Scorecard rates 18 supply-chain practices
# (branch-protection, signed-releases, pinned-deps, token-permissions,
# code-review, etc.) on a 0-10 scale and bubbles up the lowest-scoring
# checks as actionable findings.
#
# Why this matters for ar-agents distribution: Socket.dev and similar
# auditors weight the OpenSSF score in their own composite. Adding this
# workflow + the resulting badge boosts the package's perceived
# trustworthiness on every npm/Socket dashboard.
name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC — weekly
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required for uploading SARIF to GitHub code-scanning.
      security-events: write
      # Required for OIDC token to publish results to the public API.
      id-token: write
      # Read access to the repo (default).
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the public OpenSSF API so a badge link works.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
