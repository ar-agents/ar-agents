name: Deprecate PII versions (one-off, 2026-06-25)

# Manual one-off. Deprecates every version published BEFORE the 2026-06-25
# PII-scrub republish for the 16 affected packages. Those tarballs shipped a
# real CUIT + address (test fixtures) baked into README/AGENTS/dist/sourcemaps;
# the source was scrubbed 2026-06-17 but the packages were never rebuilt, so npm
# kept serving the contaminated tarballs until the republish. Clean replacements
# are already "latest"; this marks the old ranges deprecated so anyone pinned to
# one gets a warning pointing at the clean version.
#
# Uses the CI NPM_TOKEN (the only working write token — the local maintainer
# token is expired). Safe to delete this file after a successful run.
on:
  workflow_dispatch:

concurrency: deprecate-pii

jobs:
  deprecate:
    if: github.repository_owner == 'ar-agents'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - name: Deprecate contaminated version ranges
        env:
          # setup-node's .npmrc reads NODE_AUTH_TOKEN (not NPM_TOKEN).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -u
          # "pkg:clean" — deprecate every version < clean for @ar-agents/pkg.
          PAIRS="agentic-commerce-bridge:8.0.1 ap2:0.2.2 banking:0.5.2 boletin-oficial:0.2.2 constancia:0.2.3 facturacion:0.4.2 fecred:0.2.1 firma-digital:0.2.3 identity:0.8.2 igj:0.2.3 iibb:0.4.2 iva-percepciones:0.2.3 iva-retenciones:0.2.3 mercadopago:0.18.3 sicore:0.2.3 wscdc:0.2.3"
          fail=0
          for pair in $PAIRS; do
            p="${pair%%:*}"; clean="${pair##*:}"; name="@ar-agents/$p"
            msg="Older versions contained personal PII (test fixtures) and have been superseded. Upgrade to $name@>=$clean, rebuilt from scrubbed source. Removal of the old tarballs has been requested from npm support."
            echo "::group::deprecate $name@<$clean"
            if npm deprecate "$name@<$clean" "$msg"; then echo "ok: $name"; else echo "::error::deprecate failed for $name"; fail=1; fi
            echo "::endgroup::"
          done
          exit $fail
