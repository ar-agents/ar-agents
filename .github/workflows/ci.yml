name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHAs for supply chain integrity. Dependabot
      # (.github/dependabot.yml) auto-PRs SHA bumps so they stay current.
      # Tag comments after each SHA describe what version it resolves to.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        # Version is read from packageManager in package.json (pnpm@10.x)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build FIRST — packages with workspace deps (e.g. facturacion → identity/wsaa)
      # need consumed package's dist/*.d.ts to exist before typecheck resolves
      # the subpath exports.
      - name: Build packages
        run: pnpm -r --filter "./packages/*" run build

      - name: Typecheck packages
        run: pnpm -r --filter "./packages/*" run typecheck

      - name: Test packages (with coverage)
        run: pnpm -r --filter "./packages/*" run test:coverage

      - name: Validate package.json + .d.ts (publint + arethetypeswrong)
        run: pnpm -r --filter "./packages/*" run validate

      - name: Check bundle size budgets
        run: pnpm -r --filter "./packages/*" run size
