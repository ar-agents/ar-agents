name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck packages
        run: pnpm -r --filter "./packages/*" run typecheck

      - name: Test packages (with coverage)
        run: pnpm -r --filter "./packages/*" run test:coverage

      - name: Build packages
        run: pnpm -r --filter "./packages/*" run build

      - name: Validate package.json + .d.ts (publint + arethetypeswrong)
        run: pnpm -r --filter "./packages/*" run validate

      - name: Check bundle size budgets
        run: pnpm -r --filter "./packages/*" run size
