name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHAs for supply chain integrity. Dependabot
      # (.github/dependabot.yml) auto-PRs SHA bumps so they stay current.
      # Tag comments after each SHA describe what version it resolves to.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0
        # Version is read from packageManager in package.json (pnpm@10.x)

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          cache: pnpm

      # Real PII (CUIT/name/address/birthdate/phone) leaked into fixtures before;
      # fail the build if any known real-PII literal reappears. Use the fictional
      # identity instead (CUIT 20123456786 / PEREZ JUAN / Calle Falsa 123).
      - name: Guard against real-PII reintroduction
        run: |
          if git grep -nE '20417581015|CLEMENTE NAZARENO|Cabo Corrientes|1999-02-10|695 63 22 37' -- ':!.github/workflows'; then
            echo "::error::Real PII found in the tree — replace it with the fictional identity."
            exit 1
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build FIRST — packages with workspace deps (e.g. facturacion → identity/wsaa)
      # need consumed package's dist/*.d.ts to exist before typecheck resolves
      # the subpath exports.
      - name: Build packages
        run: pnpm -r --filter "./packages/*" run build

      - name: Typecheck packages
        run: pnpm -r --filter "./packages/*" run typecheck

      - name: Verify tools.manifest.json files match src/tools.ts
        # Stale manifests were a CRITICAL finding from /review — consumers
        # reading the published manifest as source-of-truth got a 3-version-
        # stale view. This gate fails the build if any manifest drifts.
        run: pnpm run check-manifests

      - name: Test packages (with coverage)
        run: pnpm -r --filter "./packages/*" run test:coverage

      - name: Validate package.json + .d.ts (publint + arethetypeswrong)
        run: pnpm -r --filter "./packages/*" run validate

      - name: Check bundle size budgets
        run: pnpm -r --filter "./packages/*" run size

  # The landing app (every API route, lib/audit, lib/ratelimit, the money layer)
  # was never gated by CI — a type error or broken edge route only surfaced at
  # Vercel build time. This job typechecks + lints + tests it on every push.
  landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      # Workspace deps must be built before the landing typechecks against them.
      - name: Build packages
        run: pnpm -r --filter "./packages/*" run build
      - name: Typecheck landing
        run: pnpm --filter ar-agents-landing run typecheck
      - name: Test landing
        run: pnpm --filter ar-agents-landing run test
      # Lint is informational for now: the landing carries ~180 pre-existing
      # lint errors (mostly react/no-unescaped-entities across marketing pages)
      # from before it was ever in CI. Surfacing them without blocking; the
      # cleanup is a separate mechanical task. typecheck + test are the hard gates.
      - name: Lint landing (non-blocking)
        run: pnpm --filter ar-agents-landing run lint
        continue-on-error: true
