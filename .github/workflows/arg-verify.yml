# Self-defending standard: every push must independently reproduce the
# published /arg conformance vectors (RFC-004 HMAC, RFC-005 Ed25519,
# RFC-006 chain/anchor/projection + §8.1 export bundle). A cited standard
# is only defensible if its conformance is machine-enforced, not asserted.
# Zero-dependency on purpose — no pnpm install — so it cannot rot or be
# weakened by the dependency graph.
name: arg-verify

# Read-only job: explicit minimal GITHUB_TOKEN scope.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vectors:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned to match the repo's supply-chain convention (see ci.yml).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Reproduce published conformance vectors (clean-room, offline)
        run: node tools/arg-verify/arg-verify.mjs vectors

      # The published vectors MUST be exactly what the deterministic
      # generator emits — guards against a hand-edited vector file that
      # passes the verifier but no longer matches the reference generator.
      - name: Published vectors match the deterministic generator
        run: |
          node tools/arg-verify/_gen-rfc006-vectors.mjs > /tmp/rfc-006-v1.json
          diff -u apps/landing/public/test-vectors/rfc-006-v1.json /tmp/rfc-006-v1.json \
            || { echo "::error::rfc-006-v1.json is out of sync with _gen-rfc006-vectors.mjs (re-run the generator)"; exit 1; }

      # The two arg-verify.mjs copies (canonical tool + public ASCII twin served
      # at /arg-verify.mjs) MUST stay logically identical: the public copy is the
      # canonical one with the em-dash removed and the "/arg" brand swapped for
      # "ar-agents". This ASCII-normalized diff stops the two from silently
      # diverging on any future verifier change (a real latent drift risk).
      - name: arg-verify.mjs copies are in sync (ASCII-normalized)
        run: |
          sed -e 's/—/-/g' \
              -e 's#the published /arg standard#the published ar-agents standard#' \
              -e 's#verifier for the /arg operational-log#verifier for the ar-agents operational-log#' \
              tools/arg-verify/arg-verify.mjs > /tmp/arg-verify.normalized.mjs
          diff -u /tmp/arg-verify.normalized.mjs apps/landing/public/arg-verify.mjs \
            || { echo "::error::apps/landing/public/arg-verify.mjs has drifted from tools/arg-verify/arg-verify.mjs (apply every verifier change to BOTH copies)"; exit 1; }
