name: Release

# Manual trigger only. Publishing is currently done by hand via `npm publish`
# from a maintainer's machine. This workflow is kept for the day we wire up
# the changesets/action automated flow.
#
# Was firing on every push and spamming failure emails because the auto-PR
# step ("changesets/action" creating a Version Packages PR) requires
# "Allow GitHub Actions to create and approve pull requests" enabled in
# repo settings → Actions → General. Until that's enabled, leave manual.
on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    if: github.repository_owner == 'ar-agents'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      # Pinned to commit SHAs for supply chain integrity. The release
      # workflow has access to NPM_TOKEN, so third-party action pinning is
      # critical. Dependabot auto-PRs SHA bumps.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0
        # Version is read from packageManager in package.json (pnpm@10.x)

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter "./packages/*" run build

      - name: Create Release Pull Request or publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d  # v1.9.0
        with:
          publish: pnpm exec changeset publish
          version: pnpm exec changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node@v4 with `registry-url` writes a .npmrc that reads the
          # token from NODE_AUTH_TOKEN (NOT NPM_TOKEN — common gotcha).
          # Without this rename, `npm publish` runs unauthenticated and the
          # registry returns E404 on PUT (npm uses 404 instead of 401/403 to
          # avoid leaking which packages exist).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
