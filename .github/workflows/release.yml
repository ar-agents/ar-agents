name: Release

# Manual trigger only. Publishing is currently done by hand via `npm publish`
# from a maintainer's machine. This workflow is kept for the day we wire up
# the changesets/action automated flow.
#
# Was firing on every push and spamming failure emails because the auto-PR
# step ("changesets/action" creating a Version Packages PR) requires
# "Allow GitHub Actions to create and approve pull requests" enabled in
# repo settings → Actions → General. Until that's enabled, leave manual.
on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    if: github.repository_owner == 'ar-agents'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      # Pinned to commit SHAs for supply chain integrity. The release
      # workflow has access to NPM_TOKEN, so third-party action pinning is
      # critical. Dependabot auto-PRs SHA bumps.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        # Version is read from packageManager in package.json (pnpm@10.x)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter "./packages/*" run build

      - name: Create Release Pull Request or publish to npm
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf  # v1.7.0
        with:
          publish: pnpm exec changeset publish
          version: pnpm exec changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
