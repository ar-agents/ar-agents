# Dependabot — keeps GitHub Action SHAs current.
#
# The CI/release workflows pin actions to commit SHAs for supply chain
# integrity (per the security audit). Dependabot opens PRs when newer
# tagged commits exist for those refs, so we don't drift behind security
# patches in upstream actions.
#
# Schedule is weekly to avoid PR spam — security updates get fast-tracked
# automatically by GitHub regardless of schedule.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    # Major-version bumps need manual review for breaking-change syntax
    # (e.g., actions/checkout@v6 changed default fetch-depth, removed
    # `set-output` support, etc.). Dependabot still PRs minor + patch
    # within the current major so we get security updates fast.
    ignore:
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pnpm/action-setup"
        update-types: ["version-update:semver-major"]
      - dependency-name: "changesets/action"
        update-types: ["version-update:semver-major"]
