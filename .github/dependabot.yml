# Dependabot — keeps GitHub Action SHAs current.
#
# The CI/release workflows pin actions to commit SHAs for supply chain
# integrity (per the security audit). Dependabot opens PRs when newer
# tagged commits exist for those refs, so we don't drift behind security
# patches in upstream actions.
#
# Schedule is weekly to avoid PR spam — security updates get fast-tracked
# automatically by GitHub regardless of schedule.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    # Major-version bumps need manual review for breaking-change syntax
    # (e.g., actions/checkout@v6 changed default fetch-depth, removed
    # `set-output` support, etc.). Dependabot still PRs minor + patch
    # within the current major so we get security updates fast.
    ignore:
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pnpm/action-setup"
        update-types: ["version-update:semver-major"]
      - dependency-name: "changesets/action"
        update-types: ["version-update:semver-major"]

  # npm/pnpm workspace: without this entry the 37 published packages get no
  # automated dependency or security PRs at all (the pnpm.overrides security
  # pins in package.json were being maintained by hand). Grouped weekly PRs
  # keep the volume low: one PR for all minor+patch dev bumps, one for prod.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Majors need manual review (peer ranges + published package contracts).
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
